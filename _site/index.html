<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>海纳百川 | Broad and Profound</title>
  <link rel="icon" href="assets/logo/favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="站点导航">
      <div class="sidebar-top">
        <a class="brand" href="#home" aria-label="返回首页">
          <img src="assets/logo/logo.png" alt="">
          <span>
            <strong>海纳百川</strong>
            <small>Broad and Profound</small>
          </span>
        </a>
        <button class="icon-button" id="sidebarToggle" type="button" aria-label="切换侧栏">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
      </div>

      <nav class="nav-scroll">
        <a class="nav-link home-link" href="#home" data-home-link>
          <span class="nav-icon" data-home-icon></span>
          <span class="nav-text">首页</span>
        </a>
        <div id="navGroups"></div>
      </nav>

    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-button mobile-menu" id="mobileSidebarToggle" type="button" aria-label="打开侧栏">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
          <div class="crumb" id="breadcrumb">首页</div>
        </div>
        <div class="top-actions">
          <button class="icon-button sections-toggle" id="sectionsToggle" type="button" aria-label="展开全部瀑布框" title="展开全部瀑布框" hidden>
            <span class="sections-toggle-icon" aria-hidden="true"></span>
          </button>
          <button class="icon-button theme-toggle" id="themeToggle" type="button" aria-label="切换明暗模式" title="切换明暗模式">
            <span class="theme-icon" aria-hidden="true"></span>
          </button>
        </div>
      </header>
      <section class="page" id="pageMount" aria-live="polite"></section>
    </main>
  </div>

  <footer class="site-footer">
    <span>海纳百川</span>
    <span>Broad and Profound</span>
  </footer>

  <script src="site-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
